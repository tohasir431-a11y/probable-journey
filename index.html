<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEXORA ESPORTS</title>
    <style>
        /* Red, Black, and White Theme */
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }

        /* Hero / Header Section */
        header {
            padding: 60px 20px;
            background: linear-gradient(180deg, #1f0202 0%, #0b0b0b 100%);
            border-bottom: 2px solid #ff0000;
        }

        .logo {
            max-width: 320px;
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.5));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 2.8rem;
            letter-spacing: 3px;
            margin-top: 25px;
            color: #ffffff;
            text-transform: uppercase;
            font-weight: 900;
        }

        h1 span {
            color: #ff0000;
        }

        .tagline {
            color: #cccccc;
            font-size: 1.1rem;
            margin-top: -10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Team Section */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .section-title {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 50px;
            color: #ffffff;
            font-weight: 800;
        }

        .section-title span {
            color: #ff0000;
        }

        /* Roster Grid */
        .roster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
        }

        /* Player Card Design (Black, White, Red) */
        .player-card {
            background-color: #141414;
            border: 2px solid #ffffff; /* Sharp white border */
            border-radius: 0px; /* Sharp esports edges */
            padding: 30px 20px;
            transition: all 0.3s ease;
            position: relative;
        }

        /* Red hover effect */
        .player-card:hover {
            transform: scale(1.03);
            border-color: #ff0000; /* Border changes to red on hover */
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        }

        /* Player Image Styling */
        .player-img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border: 2px solid #ffffff;
            margin-bottom: 15px;
            background-color: #222; /* Fallback if image isn't loaded yet */
            transition: border-color 0.3s ease;
        }

        .player-card:hover .player-img {
            border-color: #ff0000; /* Picture frame flashes red on card hover */
        }

        .player-name {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 12px;
            color: #ffffff;
            text-transform: uppercase;
        }

        .player-role {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #ffffff;
            font-weight: 700;
            letter-spacing: 1.5px;
            background-color: #ff0000; /* Bold red badge */
            padding: 6px 16px;
            display: inline-block;
        }

        /* Footer */
        footer {
            margin-top: 100px;
            padding: 30px;
            background-color: #000000;
            color: #888888;
            font-size: 0.85rem;
            border-top: 1px solid #222222;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <img src="vex.logo.png" alt="Vexora ESP Logo" class="logo">
        <h1>VEXORA <span>ESP</span></h1>
        <p class="tagline">Official Team</p>
    </header>

    <main class="container">
        <h2 class="section-title">Active <span>PLAYERS</span></h2>
        
        <div class="roster-grid">
            
            <div class="player-card">
                <img src="shayek.png" alt="VEX-SH4YEK" class="player-img">
                <div class="player-name">VEX-SH4YEK</div>
                <div class="player-role">FOUNDER & SPONSOR ROLE: SUPPORTER</div>
            </div>

            <div class="player-card">
                <img src="mahfuz.png" alt="VEX-MAHFUZ" class="player-img">
                <div class="player-name">VEX-MAHFUZ</div>
                <div class="player-role">ROLE: IGL & 1ST RUSHER</div>
            </div>

            <div class="player-card">
                <img src="delta87.png" alt="VEX-DELTA87" class="player-img">
                <div class="player-name">VEX-DELTA87</div>
                <div class="player-role">ROLE: 2ND RUSHER</div>
            </div>

            <div class="player-card">
                <img src="sifat.png" alt="VEX-SIFAT" class="player-img">
                <div class="player-name">VEX-SIFAT</div>
                <div class="player-role">ROLE: SNIPER</div>
            </div>

        </div>
    </main>

    <footer>
        &copy; 2026 VEXORA ESP. ALL RIGHTS RESERVED.
    </footer>

</body>
</html>
