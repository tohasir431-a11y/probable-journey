<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>VEXORA E-SPORTS</title>
<style>
body{margin:0;background:#050505;color:#fff;font-family:Arial}
.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;background:radial-gradient(circle,#700,#000)}
h1{color:#ff2020} .btn{background:#f00;color:#fff;padding:12px 20px;text-decoration:none;border-radius:8px}
</style></head>
<body>
<div class="hero">
<h1>VEXORA E-SPORTS</h1>
<p>FREE FIRE Competitive Team</p>
<a class="btn" href="#join">Join Us</a>
</div>
<section id="join" class="join-section">

  <h2>🔥 Join VEXORA E-SPORTS 🔥</h2>

  <p>Think you have what it takes to represent VEXORA in Free Fire?</p>

  <form action="https://formsubmit.co/vexora.esp@gmail.com" method="POST" class="join-form">

    <input type="hidden" name="_subject" value="New VEXORA Application">

    <input type="text" name="name" placeholder="In-Game Name" required>

    <input type="text" name="uid" placeholder="Free Fire UID" required>

    <input type="number" name="age" placeholder="Age" required>

    <input type="text" name="rank" placeholder="Current Rank" required>

    <input type="email" name="email" placeholder="Email Address" required>

    <textarea name="about" rows="4" placeholder="Tell us about yourself"></textarea>

    <button type="submit">⚔ APPLY TO JOIN ⚔</button>

  </form>

</section>

<style>

.join-section{

    padding:80px 20px;

    text-align:center;

    background:#050505;

}

.join-section h2{

    color:#ff2020;

    font-size:2.5rem;

    text-shadow:0 0 15px #ff0000;

    margin-bottom:15px;

}

.join-section p{

    color:#cccccc;

    margin-bottom:30px;

}

.join-form{

    max-width:600px;

    margin:auto;

    display:flex;

    flex-direction:column;

    gap:15px;

}

.join-form input,

.join-form textarea{

    background:#111;

    border:2px solid #aa0000;

    color:white;

    padding:15px;

    border-radius:10px;

    font-size:16px;

    outline:none;

    transition:0.3s;

}

.join-form input:focus,

.join-form textarea:focus{

    border-color:#ff0000;

    box-shadow:0 0 15px #ff0000;

}

.join-form button{

    background:linear-gradient(45deg,#990000,#ff0000);

    color:white;

    border:none;

    padding:16px;

    border-radius:10px;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;

    box-shadow:0 0 20px rgba(255,0,0,.5);

}

.join-form button:hover{

    transform:scale(1.05);

    box-shadow:0 0 30px rgba(255,0,0,.9);

}

</style></body></html>
